apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: labotrack
type: Opaque
stringData:
  POSTGRES_USER: labotrack
  POSTGRES_PASSWORD: labotrack
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: labotrack
data:
  01-create-databases.sql: |
    CREATE DATABASE samples;
    CREATE DATABASE analysis;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: labotrack
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: labotrack
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        config.linkerd.io/skip-inbound-ports: "5432"
        config.linkerd.io/skip-outbound-ports: "5432"
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "labotrack"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "labotrack"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
